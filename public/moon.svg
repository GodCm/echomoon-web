<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C4B488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F0F1A;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="40" fill="url(#moonGlow)" filter="url(#glow)"/>
  <circle cx="35" cy="40" r="8" fill="#A89B7A" opacity="0.3"/>
  <circle cx="55" cy="55" r="5" fill="#A89B7A" opacity="0.2"/>
  <circle cx="45" cy="65" r="3" fill="#A89B7A" opacity="0.25"/>
</svg>
